name: personal-blog

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  mysql:
    # MySQL 9.6.0 — Innovation 频道最新版（2026-03-05 确认）
    # 参考：https://hub.docker.com/_/mysql (Supported tags)
    image: mysql:9.6.0
    restart: unless-stopped
    # 绑定到 127.0.0.1:3306，支持 DataGrip SSH 隧道访问，公网不可直连
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      # 数据持久化
      - mysql_data:/var/lib/mysql
      # 自定义配置（字符集、时区、InnoDB 调优等），通过 !includedir 加载
      # 参考：https://hub.docker.com/_/mysql#using-a-custom-mysql-configuration-file
      - ./mysql/custom.cnf:/etc/mysql/conf.d/custom.cnf:ro
      # 初始化 SQL 脚本，首次启动按字母顺序执行
      # ⚠️ 数据目录已存在时不再执行
      # 参考：https://hub.docker.com/_/mysql#initializing-a-fresh-instance
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    # Redis 7.4-alpine — 生产环境极度稳定的 LTS 版本
    # 参考：https://hub.docker.com/_/redis
    image: redis:7.4-alpine
    restart: unless-stopped
    # 绑定到 127.0.0.1:6379，支持 DataGrip SSH 隧道访问，公网不可直连
    ports:
      - "127.0.0.1:6379:6379"
    # 加载配置文件，密码通过参数注入（配置文件不支持环境变量展开）
    # 参考：https://hub.docker.com/_/redis#additionally-if-you-want-to-use-your-own-redisconf-
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD}
    volumes:
      # 自定义配置（AOF+RDB 持久化、内存限制、禁用危险命令等）
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      # RDB 快照（dump.rdb）和 AOF 文件（appendonly.aof）持久化
      - redis_data:/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Application ─────────────────────────────────────────────────────────────

  backend:
    # personal-blog-backend — Spring Boot 3.5.7 + Java 21
    # 镜像由 GitHub Actions 自动构建并推送到 Docker Hub
    image: liusxml/personal-blog-backend:latest
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # Bitiful OSS（S3 兼容对象存储）
      BITIFUL_ENDPOINT: ${BITIFUL_ENDPOINT}
      BITIFUL_ACCESS_KEY: ${BITIFUL_ACCESS_KEY}
      BITIFUL_SECRET_KEY: ${BITIFUL_SECRET_KEY}
      BITIFUL_BUCKET: ${BITIFUL_BUCKET:-blog-module-file}
      BITIFUL_REGION: ${BITIFUL_REGION:-cn-east-1}
      # ── OpenTelemetry 无侵入链路追踪 ─────────────────────────────────────
      # 激活 Dockerfile 中预置的 opentelemetry-javaagent.jar
      JAVA_TOOL_OPTIONS: -javaagent:/app/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: personal-blog-backend
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod
      # 将 Traces 推送到同机 Alloy 容器（Docker 内网服务名）
      # ⚠️ OTel Java Agent 默认协议是 http/protobuf，对应 4318 端口（4317 是 gRPC）
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_TRACES_SAMPLER: parentbased_always_on
      # 日志已经通过 Docker stdout → Alloy → Loki 采集，禁用 OTLP 日志导出避免 404 噪音
      OTEL_LOGS_EXPORTER: none
      # 指标已通过 prometheus.scrape 从 Actuator 拉取，禁用 OTLP metrics 导出避免重复 + 404 噪音
      # 参考：https://opentelemetry.io/docs/languages/java/configuration/#properties-exporters
      OTEL_METRICS_EXPORTER: none

      # AI / 向量化（通义 DashScope）
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      # Qdrant Cloud 向量数据库鉴权
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      # ── Ops Agent（SSH 远程运维）────────────────────────────────────────────
      # 私钥在容器内的挂载路径（与 volumes 中的目标路径保持一致）
      OPS_SSH_KEY_PATH: /app/ssh/id_ed25519
      # GitHub Webhook HMAC-SHA256 验签密钥（与 GitHub 仓库 Settings > Webhooks > Secret 一致）
      OPS_WEBHOOK_SECRET: ${OPS_WEBHOOK_SECRET}
      # ── Spring Boot Admin 客户端注册（monitor profile 启动时自动注册）────────
      # monitor 服务默认不启动（profiles: monitor），但配置预留，随时可用
      ADMIN_SERVER_USERNAME: admin
      ADMIN_SERVER_PASSWORD: ${ADMIN_SERVER_PASSWORD}

    volumes:
      # 日志 volume 已移除 — 生产环境遵循 12-Factor App，日志输出到 stdout
      # Docker Daemon 负责轮转（见下方 logging 配置），Alloy 负责采集并推送到 Grafana Cloud
      # Ops Agent SSH 私钥（只读挂载）
      # 在 personal-blog/ 目录下执行：
      #   ssh-keygen -t ed25519 -f ./ssh/id_ed25519 -N '' -C 'blog-ops-agent'
      #   cat ./ssh/id_ed25519.pub >> /home/blog-ops/.ssh/authorized_keys
      # ssh/ 目录已加入 .gitignore，私钥不会被提交
      - ./ssh/id_ed25519:/app/ssh/id_ed25519:ro
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - app-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 利用 Spring Boot Actuator /actuator/health 进行健康检查
    # start_period=60s：Spring Boot + DB 连接池初始化较慢，给足宻d限期
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    # personal-blog-frontend — Next.js 16 + React 19
    # 博客展示端，纯展示无用户认证
    image: liusxml/personal-blog-frontend:latest
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_healthy
    # wget --spider: BusyBox 支持，发送 HEAD 请求，跟随重定向，返回 0 即服务存活
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  admin:
    # personal-blog-admin — Next.js 15 管理后台
    # 通过 next.config.ts rewrites 将 /api/* 代理到 backend:8080
    image: liusxml/personal-blog-admin:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # 服务端 rewrites 代理（运行时读取，指向 Docker 内部服务名）
      BACKEND_URL: http://backend:8080
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_healthy
    # wget --spider: BusyBox 支持，发送 HEAD 请求，跟随重定向，返回 0 即服务存活
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  monitor:
    # Spring Boot Admin Server — 已通过 profiles 设为按需启动
    # 默认不随 docker compose up -d 启动，需要时单独执行：
    #   docker compose --profile monitor up -d monitor
    profiles: ["monitor"]
    image: liusxml/personal-blog-admin-server:latest
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      ADMIN_SERVER_PASSWORD: ${ADMIN_SERVER_PASSWORD}
      ADMIN_SERVER_PUBLIC_URL: https://monitor.chonkybird.com
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/actuator/health | grep -q 'UP'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ── Observability ────────────────────────────────────────────────────────────

  prometheus:
    # Prometheus v3.11.0 — 2026-04-02 最新稳定版
    # 参考：https://github.com/prometheus/prometheus/releases/tag/v3.11.0
    image: prom/prometheus:v3.11.0
    restart: unless-stopped
    # 仅在 Docker 内网暴露，Grafana 通过 prometheus:9090 访问
    # 调试方式：docker compose exec prometheus wget -qO- http://localhost:9090/-/healthy
    expose:
      - "9090"
    command:
      # 指定配置文件路径（与 volumes 挂载路径一致）
      - "--config.file=/etc/prometheus/prometheus.yml"
      # 本地数据保留 15 天（VPS 磁盘友好）
      - "--storage.tsdb.retention.time=15d"
      # TSDB 数据目录（持久化 volume 挂载点）
      - "--storage.tsdb.path=/prometheus"
      # 开启热重载（向进程发送 SIGHUP 或 POST /-/reload 可重载配置）
      - "--web.enable-lifecycle"
    volumes:
      # 挂载 scrape 配置文件（只读）
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # TSDB 数据持久化（指标时序存储）
      - prometheus_data:/prometheus
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_healthy
      mysql-exporter:
        condition: service_healthy
      redis-exporter:
        condition: service_healthy
    # /-/healthy：返回 200 表示 Prometheus 已就绪并可接受查询
    # 参考：https://prometheus.io/docs/prometheus/latest/management_api/
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  grafana:
    # Grafana OSS 12.4.2 — 2026-04 最新稳定版（免费，功能足够）
    # 参考：https://hub.docker.com/r/grafana/grafana-oss/tags
    image: grafana/grafana-oss:12.4.2
    restart: unless-stopped
    # 仅通过 Caddy 反代对外暴露，不直接映射到宿主机
    expose:
      - "3000"
    environment:
      # ── 匿名访问（不需要登录）───────────────────────────────────────
      # 开启匿名访问，赋予 Viewer 角色（只读，无法修改仪表盘）
      # 参考：https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/#auth.anonymous
      GF_AUTH_ANONYMOUS_ENABLED:    "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE:   "Viewer"
      # 隐藏登录按钮，访客无法切换到登录页
      GF_AUTH_DISABLE_LOGIN_FORM:   "true"
      # ── iframe 嵌入（关键：关闭 X-Frame-Options: deny）──────────────
      # 参考：https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/#security
      GF_SECURITY_ALLOW_EMBEDDING:  "true"
      # SameSite=none + Secure：跨域 iframe 场景下 cookie 正确传递
      GF_SECURITY_COOKIE_SAMESITE:  "none"
      GF_SECURITY_COOKIE_SECURE:    "true"
      # ── 服务器配置 ───────────────────────────────────────────────────
      # 对外访问根 URL（用于告警、分享链接等绝对路径的生成）
      GF_SERVER_ROOT_URL:           "https://grafana.chonkybird.com"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      # ── 遥测：关闭匿名使用统计上报 ──────────────────────────────────
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      # Grafana 自动扫描此目录下的 YAML 完成 provisioning（数据源、仪表盘）
      # 参考：https://grafana.com/docs/grafana/latest/administration/provisioning/
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # 持久化 Grafana 运行时数据（SQLite 数据库、插件、会话等）
      - grafana_data:/var/lib/grafana
    networks:
      - app-net
    depends_on:
      prometheus:
        condition: service_healthy
    # /api/health：返回 {"database":"ok"} 即服务就绪
    # 参考：https://grafana.com/docs/grafana/latest/http_api/other/#health
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis-exporter:
    # oliver006/redis_exporter v1.67.0 — 将 Redis INFO 转化为 Prometheus metrics
    # 参考：https://github.com/oliver006/redis_exporter/releases
    image: oliver006/redis_exporter:v1.67.0-alpine
    restart: unless-stopped
    expose:
      - "9121"
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9121/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  mysql-exporter:
    # prom/mysqld-exporter v0.16.0 — 将 MySQL 状态转化为 Prometheus metrics
    # 参考：https://github.com/prometheus/mysqld_exporter/releases
    # 前置条件：在 MySQL 中创建低权限 exporter 用户，见 mysql/init/02-exporter-user.sql
    # v0.16.0 改用 .my.cnf 配置文件传入连接信息（不再支持 DATA_SOURCE_NAME 环境变量）
    image: prom/mysqld-exporter:v0.16.0
    restart: unless-stopped
    expose:
      - "9104"
    command:
      - "--config.my-cnf=/etc/mysql-exporter/.my.cnf"
      - "--mysqld.address=mysql:3306"
      - "--collect.info_schema.processlist"
    volumes:
      # .my.cnf 由 mysql/exporter.cnf 模板生成，或在服务器上直接创建
      - ./mysql/exporter.cnf:/etc/mysql-exporter/.my.cnf:ro
    networks:
      - app-net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9104/metrics | head -1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s


  dozzle:
    # Dozzle v10.2.1 — 实时容器日志查看器 + 容器管控
    # 参考：https://github.com/amir20/dozzle/releases
    image: amir20/dozzle:v10.2.1
    restart: unless-stopped
    # 绑定 127.0.0.1，通过 Caddy 子域名 + 密码保护对外暴露
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      # 开启容器管理功能（重启、停止等操作）
      DOZZLE_ENABLE_ACTIONS: "true"
      # 简单用户名/密码认证（生产环境必须开启）
      DOZZLE_AUTH_PROVIDER: simple
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # users.yml 需在服务器上提前生成（见 README 步骤）
      - ./dozzle/users.yml:/data/users.yml:ro
    networks:
      - app-net

  alloy:
    # Grafana Alloy — 官方 OpenTelemetry Collector 发行版
    # 负责：① Docker 日志 → Loki  ② Prometheus 指标 → Mimir  ③ OTel Traces → Tempo
    # 参考：https://grafana.com/docs/alloy/latest/set-up/install/docker/
    # 参考：https://github.com/grafana/alloy/releases — v1.15.0 为 2026-03-26 最新稳定版
    image: grafana/alloy:v1.15.0
    restart: unless-stopped
    ports:
      # Alloy Web UI：绑定 localhost（通过 SSH 隧道访问，不对公网暴露）
      - "127.0.0.1:12345:12345"
    expose:
      # OTel 接收端口：仅在 Docker 内网暴露，后端 OTel Agent 通过服务名访问
      - "4317"   # OTLP gRPC
      - "4318"   # OTLP HTTP
    environment:
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY}
      GRAFANA_LOKI_URL: ${GRAFANA_LOKI_URL}
      GRAFANA_LOKI_USERNAME: ${GRAFANA_LOKI_USERNAME}
      GRAFANA_PROMETHEUS_URL: ${GRAFANA_PROMETHEUS_URL}
      GRAFANA_PROMETHEUS_USERNAME: ${GRAFANA_PROMETHEUS_USERNAME}
      GRAFANA_TEMPO_URL: ${GRAFANA_TEMPO_URL}
      GRAFANA_TEMPO_USERNAME: ${GRAFANA_TEMPO_USERNAME}
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      # Alloy 进度文件（记录已读取的日志偏移量，防止重启后重复推送）
      - alloy_data:/var/lib/alloy/data
      # 读取宿主机 Docker 容器原始日志文件
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_healthy
    # /-/ready 端点：返回 200 表示 Alloy 已就绪
    # 参考：https://grafana.com/docs/alloy/latest/reference/http/
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:12345/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Gateway（唯一对外暴露端口的服务）──────────────────────────────────────────

  caddy:
    # Caddy 2.11.1 — 当前最新稳定版（2026-03-05 确认）
    # 参考：https://github.com/caddyserver/caddy/releases
    # 官方 Docker Compose 配置指南：https://caddyserver.com/docs/running#docker-compose
    image: caddy:2.11.1-alpine
    restart: unless-stopped
    # NET_ADMIN：quic-go 需要此权限提升 UDP 缓冲区以优化 HTTP/3 性能
    # 参考：https://hub.docker.com/_/caddy#linux-capabilities
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"           # HTTP（ACME HTTP-01 挑战 + 自动跳转 HTTPS）
      - "443:443"         # HTTPS
      - "443:443/udp"     # HTTP/3（QUIC）
    volumes:
      # 挂载整个 caddy 目录，支持 Caddyfile import 拆分配置
      # 参考：https://caddyserver.com/docs/running#setup
      - ./caddy:/etc/caddy:ro
      # CV 简历静态页（cv.chonkybird.com），由 Caddy file_server 提供服务
      - ./cv:/srv/cv:ro
      # caddy_data：持久化运行时数据（Cloudflare Origin CA 证书在 certs/ bind mount 中，
      # 此 volume 存储的是 Caddy 内部运行时状态，并非 TLS 证书本身）
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      admin:
        condition: service_healthy
      # monitor 已切换为按需启动（profiles: monitor），从依赖中移除
      dozzle:
        condition: service_started
      grafana:
        condition: service_healthy
    # 热重载（官方推荐，不停机更新 Caddyfile）：
    # docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  redis_data:
  caddy_data:
  caddy_config:
  alloy_data:       # Alloy 日志采集进度持久化（防止重启后重复推送）
  prometheus_data:  # Prometheus TSDB 时序数据（保留 15 天）
  grafana_data:     # Grafana 运行时数据（SQLite DB、插件、会话等）

# ==============================================================================
# redis.conf — Redis 自定义配置文件
# 参考：https://redis.io/docs/latest/operate/oss_and_stack/management/persistence/
# ==============================================================================

# ── 安全 ────────────────────────────────────────────────────────────────────
# 注意：密码通过 compose.yml 的 command 参数 --requirepass 传入（支持 .env 变量展开）
# 不在此文件中硬编码密码
# 官方安全文档：https://hub.docker.com/_/redis#security

# 禁用危险命令（防止误操作或恶意攻击）
# FLUSHALL / FLUSHDB / DEBUG 对个人博客无使用场景，直接禁用
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""
# CONFIG 命令保留：Redis 7.x 内部健康检查和部分客户端依赖此命令
# 已通过强随机密码（requirepass）保护，无需再 rename

# ── 持久化：RDB 快照 ─────────────────────────────────────────────────────────
# 官方推荐：AOF + RDB 双持久化，提供最高数据安全性
# 参考：https://redis.io/docs/latest/operate/oss_and_stack/management/persistence/#ok-so-what-should-i-use
#
# save <seconds> <changes>：在 N 秒内至少有 M 次写操作时触发 RDB 快照
# 多条 save 规则组合使用（OR 关系，满足任一即触发）
# 1 小时内至少 1 次写操作
save 3600 1
# 5 分钟内至少 100 次写操作
save 300 100
# 1 分钟内至少 10000 次写操作
save 60 10000

# RDB 快照文件名和存储目录
dbfilename dump.rdb
dir /data

# RDB 压缩（节省磁盘，略增 CPU 消耗）
rdbcompression yes

# 保存失败时阻止写操作（数据安全优先）
stop-writes-on-bgsave-error yes

# ── 持久化：AOF（Append Only File）────────────────────────────────────────────
# 官方说明：AOF 提供比 RDB 更细粒度的数据持久化
# 参考：https://redis.io/docs/latest/operate/oss_and_stack/management/persistence/#aof-advantages
appendonly yes

# AOF 文件名
appendfilename "appendonly.aof"

# fsync 策略（官方建议）：
# always   — 每次写操作都 fsync，最安全，性能最低
# everysec — 每秒 fsync 一次（默认）✅ 官方推荐，最多丢失 1 秒数据
# no       — 由 OS 决定，性能最高，不可控
appendfsync everysec

# AOF 重写期间不 fsync（避免重写时阻塞主线程）
no-appendfsync-on-rewrite no

# AOF 自动重写触发条件（文件大小增长超过上次重写后的百分比）
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── 内存管理 ─────────────────────────────────────────────────────────────────
# 最大内存限制，防止 Redis 撑爆容器内存
maxmemory 256mb

# 内存淘汰策略（内存满时如何驱逐 key）：
# allkeys-lru — 从所有 key 中驱逐最近最少使用的，适合缓存场景 ✅
# volatile-lru — 只驱逐设了过期时间的 key（更保守）
maxmemory-policy allkeys-lru

# ── 网络 ────────────────────────────────────────────────────────────────────
# 最大客户端连接数
maxclients 100

# TCP 连接积压队列大小（需配合系统参数 /proc/sys/net/core/somaxconn）
tcp-backlog 128

# 空闲连接超时（秒），0 = 永不超时
timeout 300

# ── 日志 ────────────────────────────────────────────────────────────────────
# 日志级别：debug / verbose / notice / warning
loglevel notice

# 空字符串 = 输出到 stdout（Docker logs 可直接查看）
logfile ""

name: blog-caddy

services:

  caddy:
    # Caddy 2.11.1 — 当前最新稳定版（2026-03-05 确认）
    # 参考：https://github.com/caddyserver/caddy/releases
    # 官方 Docker Compose 配置指南：https://caddyserver.com/docs/running#docker-compose
    image: caddy:2.11.1-alpine

    restart: unless-stopped

    # NET_ADMIN 权限说明（来自官方文档）：
    # Caddy 默认启用 HTTP/3（QUIC 协议，基于 UDP）。
    # 底层 quic-go 库需要 NET_ADMIN 权限来提升 UDP socket 缓冲区大小，
    # 以获得更好的 HTTP/3 吞吐性能。
    # 参考：https://hub.docker.com/_/caddy#linux-capabilities
    cap_add:
      - NET_ADMIN

    # 只有 caddy 对外暴露端口（遵循 docker-compose.md 规范 §3.5）
    ports:
      - "80:80"           # HTTP（Caddy 自动处理 ACME HTTP-01 挑战，申请 TLS 证书）
      - "443:443"         # HTTPS
      - "443:443/udp"     # HTTP/3（QUIC 协议，需要单独映射 UDP）

    volumes:
      # 官方推荐：挂载整个 conf 目录（而不是单个 Caddyfile 文件）
      # 这样支持 Caddyfile import 其他配置文件，结构更灵活
      # 参考：https://caddyserver.com/docs/running#setup
      - ./caddy:/etc/caddy:ro

      # caddy_data：持久化运行时数据（Cloudflare Origin CA 证书在 certs/ bind mount 中，
      # 此 volume 存储的是 Caddy 内部运行时状态，并非 TLS 证书本身）
      - caddy_data:/data

      # caddy_config：持久化运行时配置缓存，加速 caddy reload 速度
      - caddy_config:/config

    networks:
      - app-net

    # 热重载（官方推荐，不停机更新 Caddyfile）：
    # docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile
    # 或信号方式（v2.11.0+，实验性）：
    # docker compose kill -sUSR1 caddy

    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  app-net:
    driver: bridge

volumes:
  # caddy_data 必须使用命名 volume，不能用 bind mount 或匿名 volume
  caddy_data:
  caddy_config:
